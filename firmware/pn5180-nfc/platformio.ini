; ============================================================
; Filla IQ — NFC Pico Coprocessor
; RP2040 + PN5180, Arduino framework via earlephilhower core
; ============================================================

[env:nfc_pico]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = pico
framework = arduino
board_build.core = earlephilhower

monitor_speed = 115200

build_flags =
    -DCORE_DEBUG_LEVEL=3

; PN5180 library is in lib/PN5180/ (copied from scan-station)
; mbedtls for HKDF comes from the pico-sdk (always available)
lib_deps =
    Wire
    SPI
