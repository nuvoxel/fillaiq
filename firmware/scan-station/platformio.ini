; ============================================================
; Filla IQ — FillaScan
; ============================================================

; Shared settings
[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
monitor_echo = yes
monitor_filters = default, send_on_enter
upload_speed = 921600

build_src_filter =
    +<main.cpp>
    +<bambu_tag.cpp>
    +<nfc.cpp>
    +<weight.cpp>
    +<api_client.cpp>
    +<provision.cpp>
    +<backlight.cpp>
    +<display.cpp>
    +<color.cpp>
    +<distance.cpp>
    +<ota_update.cpp>
    +<environment.cpp>
    +<device_config.cpp>
    +<device_identity.cpp>
    +<printer.cpp>

lib_deps =
    bogde/HX711@^0.7.5
    sparkfun/SparkFun Qwiic Scale NAU7802 Arduino Library@^1.0.6
    adafruit/Adafruit NeoPixel@^1.12.0
    bblanchon/ArduinoJson@^7.0
    adafruit/Adafruit PN532@^1.3.4
    pololu/VL53L1X@^1.3.1
    adafruit/Adafruit AS7341@^1.3.2
    ricmoo/QRCode@^0.0.1
    bodmer/TFT_eSPI@^2.5.43
    adafruit/DHT sensor library@^1.4.6
    adafruit/Adafruit Unified Sensor@^1.1.14

; ── Variant: DevKitC-1 + separate ST7789 1.69" SPI display ──────
[env:scan_station]
board = rymcu-esp32-s3-devkitc-1
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3
    -DCONFIG_BT_BTU_TASK_STACK_SIZE=8192
    -DUSER_SETUP_LOADED=1
    -DST7789_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=280
    -DTFT_MOSI=11
    -DTFT_SCLK=12
    -DTFT_MISO=13
    -DTFT_CS=21
    -DTFT_DC=15
    -DTFT_RST=16
    -DSPI_FREQUENCY=40000000
    -DUSE_FSPI_PORT
    -DCGRAM_OFFSET=1
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT6=1
    -DLOAD_FONT7=1
    -DLOAD_FONT8=1
    -DLOAD_GFXFF=1

; ── Variant: 2.8" ESP32-S3 ILI9341 touch board (lcdwiki) ────────
[env:scan_station_touch]
board = esp32-s3-devkitc-1
board_build.flash_size = 16MB
board_build.partitions = default_16MB.csv
board_upload.flash_size = 16MB
board_build.arduino.cdc_on_boot = 1
monitor_rts = 0
monitor_dtr = 0
build_flags =
    -DBOARD_SCAN_TOUCH=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3
    -DCONFIG_BT_BTU_TASK_STACK_SIZE=8192
    -DUSER_SETUP_LOADED=1
    -DILI9341_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_MOSI=11
    -DTFT_SCLK=12
    -DTFT_MISO=13
    -DTFT_CS=10
    -DTFT_DC=46
    -DTFT_RST=-1
    -DSPI_FREQUENCY=40000000
    -DUSE_FSPI_PORT
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT6=1
    -DLOAD_FONT7=1
    -DLOAD_FONT8=1
    -DLOAD_GFXFF=1
