; ============================================================
; Filla IQ — FillaScan
; ============================================================

; Shared settings
[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
monitor_echo = yes
monitor_filters = default, send_on_enter
upload_speed = 921600
lib_ldf_mode = deep+
extra_scripts = pre:extra_script.py

build_src_filter =
    +<main.cpp>
    +<bambu_tag.cpp>
    +<nfc.cpp>
    +<weight.cpp>
    +<api_client.cpp>
    +<provision.cpp>
    +<backlight.cpp>
    +<display.cpp>
    +<color.cpp>
    +<distance.cpp>
    +<ota_update.cpp>
    +<environment.cpp>
    +<device_config.cpp>
    +<device_identity.cpp>
    +<fiq_mqtt.cpp>
    +<bambu_mqtt.cpp>
    +<printer.cpp>
    +<touch.cpp>
    +<sdcard.cpp>
    +<audio.cpp>
    +<nfc_i2c_bridge.cpp>
    ; turntable.cpp excluded — not used by FillaScan

lib_deps =
    bogde/HX711@^0.7.5
    sparkfun/SparkFun Qwiic Scale NAU7802 Arduino Library@^1.0.6
    adafruit/Adafruit NeoPixel@^1.12.0
    bblanchon/ArduinoJson@^7.0
    ; adafruit/Adafruit PN532@^1.3.4  ; Using local copy in lib/ (isready() made public)
    pololu/VL53L1X@^1.3.1
    adafruit/Adafruit AS7341@^1.3.2
    ricmoo/QRCode@^0.0.1
    lvgl/lvgl@^9.2.0
    adafruit/DHT sensor library@^1.4.6
    adafruit/Adafruit Unified Sensor@^1.1.14

; ── Variant: DevKitC-1 + separate ST7789 1.69" SPI display ──────
[env:scan_station]
board = rymcu-esp32-s3-devkitc-1
build_flags =
    -DLV_CONF_INCLUDE_SIMPLE
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_LOOP_STACK_SIZE=16384
    -DCONFIG_BT_BTU_TASK_STACK_SIZE=8192

; ── Variant: 2.8" ESP32-S3 ILI9341 touch board (lcdwiki) ────────
[env:scan_station_touch]
board = esp32-s3-devkitc-1
board_build.flash_size = 16MB
board_build.partitions = default_16MB.csv
board_upload.flash_size = 16MB
board_build.arduino.cdc_on_boot = 1
board_build.arduino.memory_type = qio_opi
monitor_rts = 0
monitor_dtr = 0
build_flags =
    -DBOARD_SCAN_TOUCH=1
    -DBOARD_HAS_PSRAM
    -DLV_CONF_INCLUDE_SIMPLE
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_LOOP_STACK_SIZE=16384
    -DCONFIG_BT_BTU_TASK_STACK_SIZE=16384
lib_deps =
    ${env.lib_deps}

; ── Minimal NFC test (nothing else running) ──────────────────
[env:nfc_test]
board = esp32-s3-devkitc-1
board_build.flash_size = 16MB
board_build.partitions = default_16MB.csv
board_upload.flash_size = 16MB
board_build.arduino.cdc_on_boot = 1
board_build.arduino.memory_type = qio_opi
monitor_rts = 0
monitor_dtr = 0
build_flags =
    -DBOARD_SCAN_TOUCH=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3
build_src_filter =
    +<nfc_test.cpp>
lib_deps =
