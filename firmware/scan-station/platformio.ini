; ============================================================
; Filla IQ — Scan Station
; ESP32-S3-DevKitC-1 + PN532(SPI) + HX711 + ST7789(SPI)
; + WS2812B + VL53L1X(I2C) + AS7341(I2C) + WiFi AP provisioning
; ============================================================

[env:scan_station]
platform = espressif32
board = rymcu-esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
monitor_echo = yes
monitor_filters = default, send_on_enter
upload_speed = 921600

; USB CDC + TFT_eSPI pin configuration
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3
    -DUSER_SETUP_LOADED=1
    -DST7789_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=280
    -DTFT_MOSI=11
    -DTFT_SCLK=12
    -DTFT_MISO=13
    -DTFT_CS=21
    -DTFT_DC=15
    -DTFT_RST=16
    -DSPI_FREQUENCY=40000000
    -DUSE_FSPI_PORT
    -DCGRAM_OFFSET=1
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT6=1
    -DLOAD_FONT7=1
    -DLOAD_FONT8=1
    -DLOAD_GFXFF=1

; Build all source files
build_src_filter =
    +<main.cpp>
    +<bambu_tag.cpp>
    +<nfc.cpp>
    +<weight.cpp>
    +<api_client.cpp>
    +<provision.cpp>
    +<backlight.cpp>
    +<display.cpp>
    +<color.cpp>
    +<distance.cpp>
    +<ota_update.cpp>
    +<environment.cpp>
    +<device_config.cpp>
    +<printer.cpp>

; Library dependencies
lib_deps =
    bogde/HX711@^0.7.5
    adafruit/Adafruit NeoPixel@^1.12.0
    bblanchon/ArduinoJson@^7.0
    adafruit/Adafruit PN532@^1.3.4
    pololu/VL53L1X@^1.3.1
    adafruit/Adafruit AS7341@^1.3.2
    ricmoo/QRCode@^0.0.1
    bodmer/TFT_eSPI@^2.5.43
