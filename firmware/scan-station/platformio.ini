; ============================================================
; Filla IQ — Scan Station
; ESP32-S3-DevKitC-1 + PN532 + HX711 + Color + VL53L1X + WS2812B + Stepper
; Universal maker measurement & identification station
; Color sensor auto-detected: AS7341, AS7265x, TCS34725, or OPT4048
; ============================================================

[env:scan_station]
platform = espressif32
board = rymcu-esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
monitor_echo = yes
monitor_filters = default, send_on_enter
upload_speed = 921600

; USB CDC for serial monitor (ESP32-S3 uses USB for serial)
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3

; Library dependencies
lib_deps =
    bogde/HX711@^0.7.5
    adafruit/Adafruit PN532@^1.3.3
    adafruit/Adafruit NeoPixel@^1.12.0
    adafruit/Adafruit AS7341@^1.2.3
    sparkfun/SparkFun AS7265X@^1.0.8
    pololu/VL53L1X@^1.3.1
    bblanchon/ArduinoJson@^7.0
    ; TCS34725 and OPT4048 use raw I2C (no library needed)
