; ============================================================
; Filla IQ — Single Slot Breadboard Prototype
; ESP32-S3-DevKitC-1 + PN53x + HX711 + ST7789V3 TFT + WS2812B
; ============================================================

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
monitor_echo = yes
monitor_filters = default, send_on_enter
upload_speed = 921600

; USB CDC for serial monitor (ESP32-S3 uses USB for serial)
build_src_filter = +<*> -<epaper_test.cpp>
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3
    ; --- TFT_eSPI configuration (ST7789V3 240x280) ---
    -DUSER_SETUP_LOADED=1
    -DST7789_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=280
    -DTFT_MOSI=11
    -DTFT_SCLK=12
    -DTFT_MISO=13
    -DTFT_CS=-1
    -DTFT_DC=8
    -DTFT_RST=9
    -DUSE_FSPI_PORT=1
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=20000000
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    ; --- LVGL ---
    -DLV_CONF_INCLUDE_SIMPLE
    -Iinclude

; Library dependencies
lib_deps =
    bogde/HX711@^0.7.5
    adafruit/Adafruit PN532@^1.3.3
    adafruit/Adafruit NeoPixel@^1.12.0
    bodmer/TFT_eSPI@^2.5.43
    lvgl/lvgl@^8.3.11