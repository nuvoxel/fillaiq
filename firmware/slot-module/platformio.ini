; ============================================================
; Filla IQ — Single Slot Breadboard Prototype
; ESP32-S3-DevKitC-1 + PN53x + HX711 + SSD1322 OLED + WS2812B
; ============================================================

[env:esp32s3]
platform = espressif32
board = rymcu-esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
monitor_echo = yes
monitor_filters = default, send_on_enter
upload_speed = 921600

; USB CDC for serial monitor (ESP32-S3 uses USB for serial)
build_src_filter = +<*> -<epaper_test.cpp>
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3

; Library dependencies
lib_deps =
    bogde/HX711@^0.7.5
    adafruit/Adafruit PN532@^1.3.3
    adafruit/Adafruit NeoPixel@^1.12.0
    olikraus/U8g2@^2.35.19