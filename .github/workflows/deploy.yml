name: Deploy to Azure Container Apps

on:
  push:
    branches: [main]
    paths: [web/**, mosquitto/**]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  REGISTRY: fillaiqacr.azurecr.io
  IMAGE_NAME: fillaiq-web
  MQTT_IMAGE_NAME: fillaiq-mqtt
  RESOURCE_GROUP: fillaiq-rg
  CONTAINER_APP: fillaiq-web
  MQTT_CONTAINER_APP: fillaiq-mqtt
  ENVIRONMENT: fillaiq-env

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name fillaiqacr

      # ── Build and push web app ─────────────────────────────────────
      - name: Build and push web image
        run: |
          cd web
          docker build --build-arg APP_VERSION=${{ github.sha }} \
                       -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
                       -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      # ── Build and push Mosquitto ───────────────────────────────────
      - name: Build and push MQTT broker image
        run: |
          cd mosquitto
          docker build -t ${{ env.REGISTRY }}/${{ env.MQTT_IMAGE_NAME }}:${{ github.sha }} \
                       -t ${{ env.REGISTRY }}/${{ env.MQTT_IMAGE_NAME }}:latest .
          docker push ${{ env.REGISTRY }}/${{ env.MQTT_IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.MQTT_IMAGE_NAME }}:latest

      # ── Deploy Mosquitto broker ────────────────────────────────────
      - name: Deploy MQTT broker
        run: |
          # Create if not exists, update if exists
          if az containerapp show --name ${{ env.MQTT_CONTAINER_APP }} --resource-group ${{ env.RESOURCE_GROUP }} &>/dev/null; then
            az containerapp update \
              --name ${{ env.MQTT_CONTAINER_APP }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --image ${{ env.REGISTRY }}/${{ env.MQTT_IMAGE_NAME }}:${{ github.sha }}
          else
            az containerapp create \
              --name ${{ env.MQTT_CONTAINER_APP }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --environment ${{ env.ENVIRONMENT }} \
              --image ${{ env.REGISTRY }}/${{ env.MQTT_IMAGE_NAME }}:${{ github.sha }} \
              --registry-server ${{ env.REGISTRY }} \
              --target-port 1883 \
              --transport tcp \
              --ingress external \
              --min-replicas 1 \
              --max-replicas 1 \
              --cpu 0.25 \
              --memory 0.5Gi
          fi

      # ── Deploy web app ─────────────────────────────────────────────
      - name: Deploy web app
        run: |
          # Get MQTT broker internal FQDN for web app to connect
          MQTT_FQDN=$(az containerapp show --name ${{ env.MQTT_CONTAINER_APP }} --resource-group ${{ env.RESOURCE_GROUP }} --query "properties.configuration.ingress.fqdn" -o tsv)

          az containerapp update \
            --name ${{ env.CONTAINER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --set-env-vars "MQTT_BROKER_URL=mqtt://${MQTT_FQDN}:1883"
