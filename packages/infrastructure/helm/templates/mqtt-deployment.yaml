apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: fillaiq-mqtt
  namespace: {{ .Values.namespacePrefix }}-{{ .Values.environment }}
  labels:
    app: fillaiq
    component: mqtt
    environment: {{ .Values.environment }}
spec:
  serviceName: fillaiq-mqtt
  replicas: {{ .Values.mqtt.replicas }}
  selector:
    matchLabels:
      app: fillaiq
      component: mqtt
  template:
    metadata:
      labels:
        app: fillaiq
        component: mqtt
    spec:
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
      {{- range .Values.imagePullSecrets }}
        - name: {{ . }}
      {{- end }}
      {{- end }}
      {{- with .Values.mqtt.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.mqtt.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: mqtt
          image: {{ .Values.images.registry }}/{{ .Values.mqtt.imageName | default "fillaiq-mqtt" }}:{{ .Values.mqtt.imageTag | default .Values.images.tag }}
          imagePullPolicy: {{ if eq .Values.environment "local" }}IfNotPresent{{ else }}Always{{ end }}
          ports:
            - name: mqtt
              containerPort: 1883
              protocol: TCP
            - name: websocket
              containerPort: 9001
              protocol: TCP
          volumeMounts:
            - name: mqtt-data
              mountPath: /mosquitto/data
            - name: mqtt-config
              mountPath: /mosquitto/config/mosquitto.conf
              subPath: mosquitto.conf
          resources:
            {{- toYaml .Values.mqtt.resources | nindent 12 }}
          livenessProbe:
            tcpSocket:
              port: mqtt
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: mqtt
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: mqtt-config
          configMap:
            name: mqtt-config
  volumeClaimTemplates:
    - metadata:
        name: mqtt-data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.mqtt.storage.storageClass }}
        storageClassName: {{ .Values.mqtt.storage.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.mqtt.storage.size }}
