apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: {{ .Values.namespacePrefix }}-{{ .Values.environment }}
  labels:
    app: fillaiq
    environment: {{ .Values.environment }}
type: Opaque
stringData:
  # Better Auth
  BETTER_AUTH_SECRET: {{ .Values.secrets.betterAuthSecret | quote }}
  {{- if eq .Values.environment "dev" }}
  BETTER_AUTH_URL: "http://localhost:3000"
  {{- else }}
  BETTER_AUTH_URL: {{ printf "%s://%s" (ternary "https" "http" .Values.ingress.tlsEnabled) (.Values.ingress.domain | default "localhost") | quote }}
  {{- end }}

  # Microsoft OAuth
  MS_CLIENT_ID: {{ .Values.secrets.msClientId | quote }}
  MS_CLIENT_SECRET: {{ .Values.secrets.msClientSecret | quote }}
  MS_TENANT_ID: {{ .Values.secrets.msTenantId | quote }}

  # Google OAuth
  {{- if .Values.secrets.googleClientId }}
  GOOGLE_CLIENT_ID: {{ .Values.secrets.googleClientId | quote }}
  {{- end }}
  {{- if .Values.secrets.googleClientSecret }}
  GOOGLE_CLIENT_SECRET: {{ .Values.secrets.googleClientSecret | quote }}
  {{- end }}

  # GitHub OAuth
  {{- if .Values.secrets.githubClientId }}
  GITHUB_CLIENT_ID: {{ .Values.secrets.githubClientId | quote }}
  {{- end }}
  {{- if .Values.secrets.githubClientSecret }}
  GITHUB_CLIENT_SECRET: {{ .Values.secrets.githubClientSecret | quote }}
  {{- end }}

  # Azure Communication Services (Email)
  {{- if .Values.secrets.acsConnectionString }}
  ACS_CONNECTION_STRING: {{ .Values.secrets.acsConnectionString | quote }}
  {{- end }}
  {{- if .Values.secrets.acsSenderAddress }}
  ACS_SENDER_ADDRESS: {{ .Values.secrets.acsSenderAddress | quote }}
  {{- end }}

  # MQTT Broker URL
  {{- if .Values.secrets.mqttBrokerUrl }}
  MQTT_BROKER_URL: {{ .Values.secrets.mqttBrokerUrl | quote }}
  {{- else if and .Values.ingress.enabled .Values.ingress.mqttDomain }}
  MQTT_BROKER_URL: {{ printf "wss://%s" .Values.ingress.mqttDomain | quote }}
  {{- else }}
  MQTT_BROKER_URL: "mqtt://fillaiq-mqtt:1883"
  {{- end }}
