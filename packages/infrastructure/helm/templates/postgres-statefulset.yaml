{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-scripts
  namespace: {{ .Values.namespacePrefix }}-{{ .Values.environment }}
  labels:
    app: fillaiq
    component: postgres
    environment: {{ .Values.environment }}
data:
  postgresql.conf: |
    listen_addresses = '*'
    max_connections = {{ .Values.postgres.maxConnections | default 100 }}
    shared_buffers = {{ .Values.postgres.sharedBuffers | default "128MB" }}
    work_mem = {{ .Values.postgres.workMem | default "4MB" }}
    wal_buffers = 16MB
    max_wal_size = 2GB
    checkpoint_completion_target = 0.9
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: {{ .Values.namespacePrefix }}-{{ .Values.environment }}
  labels:
    app: fillaiq
    component: postgres
    environment: {{ .Values.environment }}
spec:
  ports:
    - port: 5432
      name: postgres
      targetPort: 5432
  clusterIP: None
  selector:
    app: fillaiq
    component: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: {{ .Values.namespacePrefix }}-{{ .Values.environment }}
  labels:
    app: fillaiq
    component: postgres
    environment: {{ .Values.environment }}
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: fillaiq
      component: postgres
  template:
    metadata:
      labels:
        app: fillaiq
        component: postgres
    spec:
      {{- with .Values.postgres.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.postgres.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: postgres
          image: postgres:{{ .Values.postgres.version }}
          imagePullPolicy: IfNotPresent
          args:
            - -c
            - config_file=/etc/postgresql/postgresql.conf
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgres.database }}
            - name: POSTGRES_USER
              value: {{ .Values.postgres.user }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: postgres-config
              mountPath: /etc/postgresql
          resources:
            requests:
              memory: {{ .Values.postgres.resources.requests.memory }}
              cpu: {{ .Values.postgres.resources.requests.cpu }}
            limits:
              memory: {{ .Values.postgres.resources.limits.memory }}
              cpu: {{ .Values.postgres.resources.limits.cpu }}
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U {{ .Values.postgres.user }} -d {{ .Values.postgres.database }}
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 6
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U {{ .Values.postgres.user }} -d {{ .Values.postgres.database }}
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
      volumes:
        - name: postgres-config
          configMap:
            name: postgres-init-scripts
            items:
              - key: postgresql.conf
                path: postgresql.conf
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.postgres.storage.storageClass }}
        storageClassName: {{ .Values.postgres.storage.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.postgres.storage.size }}
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: {{ .Values.namespacePrefix }}-{{ .Values.environment }}
  labels:
    app: fillaiq
    component: postgres
    environment: {{ .Values.environment }}
type: Opaque
stringData:
  password: {{ .Values.postgres.password | quote }}
  database-url: "postgresql://{{ .Values.postgres.user }}:{{ .Values.postgres.password | urlquery }}@postgres:5432/{{ .Values.postgres.database }}?sslmode=disable"
{{- end }}
