apiVersion: v1
kind: ConfigMap
metadata:
  name: mqtt-config
  namespace: {{ .Values.namespacePrefix }}-{{ .Values.environment }}
  labels:
    app: fillaiq
    component: mqtt
    environment: {{ .Values.environment }}
data:
  mosquitto.conf: |
    # ============================================================
    # Filla IQ — Mosquitto Production Config
    # Runs inside AKS (Kubernetes).
    # ============================================================

    # ── Internal MQTT (server-to-broker, pod-to-pod) ───────────
    listener 1883 0.0.0.0
    protocol mqtt

    # ── WebSocket listener (device-facing, via nginx ingress) ──
    # Nginx terminates TLS; devices connect to wss://{{ .Values.ingress.mqttDomain | default "mqtt.fillaiq.com" }}/mqtt
    # which forwards to this WebSocket listener on port 9001.
    listener 9001 0.0.0.0
    protocol websockets

    allow_anonymous true

    persistence true
    persistence_location /mosquitto/data/

    log_dest stdout
    log_type warning
    log_type error
    log_type notice
    connection_messages true

    max_keepalive 120
    max_inflight_messages 20
    max_queued_messages 1000
    message_size_limit 65536
