apiVersion: v1
kind: Service
metadata:
  name: fillaiq-web
  namespace: {{ .Values.namespacePrefix }}-{{ .Values.environment }}
  labels:
    app: fillaiq
    component: web
    environment: {{ .Values.environment }}
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: {{ .Values.web.port }}
      protocol: TCP
      name: http
  selector:
    app: fillaiq
    component: web

---
apiVersion: v1
kind: Service
metadata:
  name: fillaiq-mqtt
  namespace: {{ .Values.namespacePrefix }}-{{ .Values.environment }}
  labels:
    app: fillaiq
    component: mqtt
    environment: {{ .Values.environment }}
spec:
  type: ClusterIP
  ports:
    - port: 1883
      targetPort: 1883
      protocol: TCP
      name: mqtt
    - port: 9001
      targetPort: 9001
      protocol: TCP
      name: websocket
  selector:
    app: fillaiq
    component: mqtt
