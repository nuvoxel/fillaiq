{{- if not .Values.postgres.enabled }}
{{- $dbUrl := .Values.externalDatabase.url }}
{{- if and (not $dbUrl) .Values.externalDatabase.host .Values.postgres.password }}
{{- $dbUrl = printf "postgresql://%s:%s@%s/%s?sslmode=%s" .Values.externalDatabase.user .Values.postgres.password .Values.externalDatabase.host .Values.externalDatabase.database .Values.externalDatabase.sslmode }}
{{- end }}
{{- if $dbUrl }}
apiVersion: v1
kind: Secret
metadata:
  name: database-connection
  namespace: {{ .Values.namespacePrefix }}-{{ .Values.environment }}
  labels:
    app: fillaiq
    component: database
    environment: {{ .Values.environment }}
type: Opaque
stringData:
  DATABASE_URL: {{ $dbUrl | quote }}
{{- end }}
{{- end }}
