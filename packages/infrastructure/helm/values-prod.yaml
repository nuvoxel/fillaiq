# Production Environment Overrides
# Deploy with: helm install fillaiq . -f values.yaml -f values-prod.yaml

environment: prod

web:
  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 512Mi
      cpu: 250m

mqtt:
  resources:
    requests:
      memory: 64Mi
      cpu: 25m
    limits:
      memory: 256Mi
      cpu: 250m
  storage:
    size: 2Gi

# Ingress Configuration
ingress:
  enabled: true
  tlsEnabled: true
  certManagerIssuer: letsencrypt-prod-dns01
  domain: fillaiq.com
  mqttDomain: mqtt.fillaiq.com

# PostgreSQL - DISABLED in prod (using Azure PostgreSQL Flexible Server)
postgres:
  enabled: false

# External Database (Azure PostgreSQL Flexible Server)
# Host, user, and database are injected via --set from GitHub Secrets
externalDatabase:
  host: ""
  user: ""
  database: ""
  sslmode: "require"
  url: ""

# Secrets
secrets:
  # Web pod connects to broker internally (pod-to-pod), not via external WSS
  mqttBrokerUrl: "mqtt://fillaiq-mqtt:1883"

# Application Configuration
app:
  nodeEnv: production
