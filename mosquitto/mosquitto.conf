# ============================================================
# Filla IQ — Mosquitto MQTT Broker Configuration
# ============================================================

# ── Internal listener (container-to-container, no TLS) ──────
listener 1883 0.0.0.0
protocol mqtt

# ── External listener (device-facing, TLS) ───────────────────
listener 8883 0.0.0.0
protocol mqtt
cafile /mosquitto/certs/ca.crt
certfile /mosquitto/certs/server.crt
keyfile /mosquitto/certs/server.key
tls_version tlsv1.2

# ── Persistence ──────────────────────────────────────────────
persistence true
persistence_location /mosquitto/data/

# ── Logging ──────────────────────────────────────────────────
log_dest stdout
log_type all
connection_messages true

# ── Auth: HTTP backend via mosquitto-go-auth ─────────────────
allow_anonymous false

auth_plugin /mosquitto/go-auth.so

auth_opt_backends http
auth_opt_cache true
auth_opt_cache_type go-cache
auth_opt_cache_reset true
auth_opt_auth_cache_seconds 300
auth_opt_acl_cache_seconds 300

# HTTP backend endpoints (Next.js app)
auth_opt_http_host web
auth_opt_http_port 3000
auth_opt_http_with_tls false
auth_opt_http_getuser_uri /api/v1/mqtt/auth
auth_opt_http_aclcheck_uri /api/v1/mqtt/acl
auth_opt_http_response_mode status

# ── Limits ───────────────────────────────────────────────────
max_keepalive 120
max_inflight_messages 20
max_queued_messages 1000
message_size_limit 65536
