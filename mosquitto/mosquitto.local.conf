# ============================================================
# Filla IQ — Mosquitto Local Dev Config (no TLS, no auth)
# ============================================================
# Use this for local development without TLS certs or auth setup.
# Run: mosquitto -c mosquitto/mosquitto.local.conf

listener 1883 0.0.0.0
protocol mqtt
allow_anonymous true

persistence true
persistence_location /tmp/mosquitto/

log_dest stdout
log_type all
connection_messages true

max_keepalive 120
message_size_limit 65536
